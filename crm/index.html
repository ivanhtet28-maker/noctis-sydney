<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Concierge Inbox · Noctis CRM</title>
<meta name="robots" content="noindex, nofollow" />
<meta name="theme-color" content="#0A0A0A" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230A0A0A'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='42' font-style='italic' fill='%23F5F1EA'%3EN%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --ink: #0A0A0A;
  --bg-1: #0d0d0d;
  --bg-2: #121212;
  --bg-3: #161616;
  --bg-4: #1c1c1c;
  --line: #1f1f1f;
  --line-2: #2a2a2a;
  --cream: #F5F1EA;
  --muted: #8C8576;
  --subtle: #5A564F;
  --accent: #6B0F1A;
  --hot: #E0524C;
  --warm: #E0A12F;
  --cold: #5B6F8E;
  --ok: #5DCC83;
}

* { box-sizing: border-box; }
html, body {
  background: var(--ink);
  color: var(--cream);
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  font-size: 14px;
}
.font-serif { font-family: 'Fraunces', serif; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

a { color: var(--cream); text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }

/* ----- Layout ----- */
.app {
  display: grid;
  grid-template-columns: 220px 380px 1fr;
  height: 100vh;
}
@media (max-width: 1100px) {
  .app { grid-template-columns: 60px 320px 1fr; }
  .sidebar .lbl { display: none; }
}
@media (max-width: 768px) {
  .app { grid-template-columns: 1fr; grid-template-rows: 60px 1fr; }
  .sidebar { display: none; }
  .inbox { display: none; }
  .app.show-detail .detail { display: flex; }
  .app.show-inbox .inbox { display: flex; }
}

/* ----- Sidebar ----- */
.sidebar {
  background: var(--bg-1);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
}
.brand {
  padding: 22px 22px 24px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand .mark {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--ink);
  border: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-style: italic;
  color: var(--cream); font-size: 18px;
}
.brand .label { font-family: 'Fraunces', serif; font-size: 17px; letter-spacing: -0.018em; }
.brand .label small { display: block; font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

.nav {
  padding: 12px 12px;
  display: flex; flex-direction: column; gap: 2px;
}
.nav .group { padding: 18px 12px 8px; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--subtle); }
.nav button.item {
  background: none;
  border: none;
  color: rgba(245,241,234,0.75);
  text-align: left;
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: 6px;
  font-size: 13px;
  width: 100%;
  transition: background .15s, color .15s;
}
.nav button.item:hover { background: var(--bg-3); color: var(--cream); }
.nav button.item.active { background: var(--bg-4); color: var(--cream); }
.nav button.item .count {
  margin-left: auto; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted);
  background: var(--bg-3); padding: 1px 7px; border-radius: 10px;
}
.nav button.item.active .count { background: rgba(245,241,234,0.1); color: var(--cream); }
.nav .swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.nav .swatch.hot  { background: var(--hot); }
.nav .swatch.warm { background: var(--warm); }
.nav .swatch.cold { background: var(--cold); }

.user {
  margin-top: auto;
  padding: 16px 16px 20px;
  border-top: 1px solid var(--line);
  display: flex; align-items: center; gap: 10px;
}
.user .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: center;
  color: var(--cream); font-weight: 500; font-size: 13px;
}
.user .info .name { font-size: 13px; color: var(--cream); }
.user .info .role { font-size: 11px; color: var(--muted); }

/* ----- Inbox column ----- */
.inbox {
  background: var(--bg-1);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.inbox-head {
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--line);
}
.inbox-head .ttl { font-family: 'Fraunces', serif; font-size: 22px; letter-spacing: -0.018em; margin: 0; }
.inbox-head .stats {
  display: flex; gap: 18px; margin-top: 14px;
}
.inbox-head .stat .n {
  font-family: 'Fraunces', serif; font-size: 22px; line-height: 1;
}
.inbox-head .stat .lbl {
  display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-top: 4px;
}
.inbox-head .stat .n.hot  { color: var(--hot); }
.inbox-head .stat .n.warm { color: var(--warm); }
.inbox-head .stat .n.ok   { color: var(--ok); }

.inbox-search {
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
}
.inbox-search input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-radius: 6px;
  padding: 8px 12px;
  outline: none;
  font-size: 13px;
  color: var(--cream);
  transition: border-color .2s;
}
.inbox-search input:focus { border-color: rgba(245,241,234,0.3); }
.inbox-search input::placeholder { color: var(--subtle); }

.inbox-list { overflow-y: auto; flex: 1; }
.inbox-item {
  padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
  position: relative;
}
.inbox-item:hover { background: var(--bg-2); }
.inbox-item.active { background: var(--bg-3); }
.inbox-item.active::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--cream);
}
.inbox-item .row {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 4px;
}
.inbox-item .name { font-weight: 500; font-size: 14px; color: var(--cream); }
.inbox-item .name.unread::after { content: "•"; color: var(--ok); margin-left: 6px; }
.inbox-item .time { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.inbox-item .preview {
  font-size: 12px; color: rgba(245,241,234,0.55);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-top: 2px;
}
.inbox-item .meta {
  display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap;
}
.tag {
  font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 10px;
  background: var(--bg-3); color: rgba(245,241,234,0.65);
  border: 1px solid var(--line-2);
}
.tag.hot   { background: rgba(224,82,76,0.15); color: var(--hot); border-color: rgba(224,82,76,0.3); }
.tag.warm  { background: rgba(224,161,47,0.15); color: var(--warm); border-color: rgba(224,161,47,0.3); }
.tag.cold  { background: rgba(91,111,142,0.15); color: var(--cold); border-color: rgba(91,111,142,0.3); }
.tag.car   { color: var(--cream); border-color: var(--line-2); background: var(--bg-3); }
.tag.ok    { background: rgba(93,204,131,0.12); color: var(--ok); border-color: rgba(93,204,131,0.3); }

/* Source tag/pill — shown per inquiry */
.source-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
  padding: 2px 8px 2px 6px; border-radius: 10px;
  background: var(--bg-3); color: rgba(245,241,234,0.7);
  border: 1px solid var(--line-2);
}
.source-pill svg { flex-shrink: 0; }
.source-pill[data-channel="instagram"] { color: #E0524C; border-color: rgba(224,82,76,0.25); background: rgba(224,82,76,0.08); }
.source-pill[data-channel="google"]    { color: #5DCC83; border-color: rgba(93,204,131,0.25); background: rgba(93,204,131,0.08); }
.source-pill[data-channel="referral"]  { color: #E0A12F; border-color: rgba(224,161,47,0.25); background: rgba(224,161,47,0.08); }
.source-pill[data-channel="signal"]    { color: #5B9DEB; border-color: rgba(91,157,235,0.25); background: rgba(91,157,235,0.08); }
.source-pill[data-channel="pinterest"] { color: #BB494E; border-color: rgba(187,73,78,0.25); background: rgba(187,73,78,0.08); }
.source-pill[data-channel="sms"]       { color: #5DCC83; border-color: rgba(93,204,131,0.25); background: rgba(93,204,131,0.08); }
.source-pill[data-channel="direct"]    { color: rgba(245,241,234,0.6); }
.source-pill[data-channel="email"]     { color: #E0A12F; border-color: rgba(224,161,47,0.25); background: rgba(224,161,47,0.08); }

/* Source-detail card in the detail pane */
.source-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-2);
  padding: 18px 22px;
  display: flex; align-items: center; gap: 18px;
}
.source-card .ico {
  width: 42px; height: 42px; border-radius: 8px;
  background: var(--bg-3); border: 1px solid var(--line-2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.source-card .info { flex: 1; min-width: 0; }
.source-card .info .lbl { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.source-card .info .ch { font-family: 'Fraunces', serif; font-size: 18px; letter-spacing: -0.018em; color: var(--cream); margin-top: 2px; }
.source-card .info .det { font-size: 12px; color: rgba(245,241,234,0.55); margin-top: 4px; line-height: 1.5; }

/* AI conversation transcript */
.transcript {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-2);
  padding: 22px 22px 22px;
}
.transcript .head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.transcript .head .ttl {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
.transcript .head .ttl::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 0 rgba(93,204,131,0.5);
  animation: nc-blink 2.4s ease-out infinite;
}
@keyframes nc-blink { 0%,100% { opacity: 0.35 } 50% { opacity: 1 } }
.transcript .head .meta { font-size: 11px; color: var(--subtle); font-family: 'JetBrains Mono', monospace; }

.transcript .feed { display: flex; flex-direction: column; gap: 10px; }
.transcript .bubble {
  max-width: 78%;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.5;
  border-radius: 14px;
}
.transcript .bubble .t {
  display: block;
  font-size: 10px;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  color: var(--subtle);
  font-family: 'JetBrains Mono', monospace;
}
.transcript .bubble.bot {
  align-self: flex-start;
  background: var(--bg-3);
  border: 1px solid var(--line-2);
  border-bottom-left-radius: 4px;
  color: rgba(245,241,234,0.92);
}
.transcript .bubble.bot .t { color: rgba(93,204,131,0.7); }
.transcript .bubble.user {
  align-self: flex-end;
  background: rgba(107,15,26,0.4);
  border: 1px solid rgba(107,15,26,0.5);
  border-bottom-right-radius: 4px;
  color: var(--cream);
}
.transcript .bubble.user .t { color: rgba(245,241,234,0.55); text-align: right; }

.transcript .foot {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px dashed var(--line);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 10px;
  font-size: 11px; color: var(--muted); letter-spacing: 0.04em;
}
.transcript .foot .extracted { display: flex; gap: 6px; flex-wrap: wrap; }

/* ----- Detail pane ----- */
.detail {
  display: flex; flex-direction: column;
  background: var(--bg-1);
  overflow: hidden;
}
.detail-head {
  padding: 22px 32px 18px;
  border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: flex-start; gap: 24px;
}
.detail-head .lhs h2 {
  font-family: 'Fraunces', serif; font-size: 26px; letter-spacing: -0.022em; margin: 0;
}
.detail-head .lhs .sub {
  margin-top: 6px; color: var(--muted); font-size: 13px;
}
.detail-head .actions { display: flex; gap: 8px; }
.btn {
  background: var(--bg-3); border: 1px solid var(--line-2); color: var(--cream);
  font-size: 12px; padding: 8px 14px; border-radius: 6px; letter-spacing: 0.04em;
  transition: background .15s, border .15s;
}
.btn:hover { background: var(--bg-4); border-color: rgba(245,241,234,0.25); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: var(--cream); }
.btn.primary:hover { background: #821426; border-color: #821426; }

.detail-body { flex: 1; overflow-y: auto; padding: 28px 32px 100px; display: grid; grid-template-columns: 1fr; gap: 24px; }

/* AI qualification card */
.ai-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
  padding: 22px 24px;
}
.ai-card .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.ai-card .head .who { display: flex; align-items: center; gap: 10px; }
.ai-card .head .av {
  width: 28px; height: 28px; border-radius: 50%; background: var(--bg-3);
  border: 1px solid var(--line-2); display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-style: italic; font-size: 14px;
}
.ai-card .head .who .name { font-size: 12px; letter-spacing: 0.04em; }
.ai-card .head .who .role { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.ai-card .verdict { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.ai-card .verdict .score {
  font-family: 'Fraunces', serif; font-size: 32px; line-height: 1;
}
.ai-card .verdict .score.hot  { color: var(--hot); }
.ai-card .verdict .score.warm { color: var(--warm); }
.ai-card .verdict .score.cold { color: var(--cold); }
.ai-card .verdict .label {
  font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
}
.ai-card p { margin: 0 0 12px; line-height: 1.5; color: rgba(245,241,234,0.85); font-size: 14px; }
.ai-card ul { margin: 6px 0 0; padding-left: 20px; color: rgba(245,241,234,0.7); font-size: 13px; line-height: 1.7; }
.ai-card .signals {
  margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap;
  border-top: 1px dashed var(--line); padding-top: 14px;
}

/* Original message */
.message {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-2);
  padding: 22px 24px;
}
.message .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
.message .from { font-family: 'Fraunces', serif; font-size: 18px; }
.message .from small { display: block; font-family: 'Inter', sans-serif; color: var(--muted); font-size: 12px; margin-top: 2px; }
.message .ts { color: var(--muted); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
.message .grid {
  display: grid; grid-template-columns: 110px 1fr; gap: 8px 20px;
  margin-bottom: 18px;
}
.message .grid dt { color: var(--muted); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; align-self: center; }
.message .grid dd { margin: 0; color: var(--cream); font-size: 13px; }
.message .body {
  border-top: 1px solid var(--line);
  padding-top: 16px;
  font-size: 14px;
  line-height: 1.65;
  color: rgba(245,241,234,0.88);
  white-space: pre-wrap;
}

/* Suggested reply */
.reply-card {
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-2);
  padding: 22px 24px;
}
.reply-card .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.reply-card .head .ttl { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.reply-card textarea {
  width: 100%;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: 8px;
  padding: 14px;
  color: var(--cream);
  font-size: 14px;
  line-height: 1.55;
  resize: vertical;
  min-height: 160px;
  outline: none;
  font-family: inherit;
}
.reply-card textarea:focus { border-color: rgba(245,241,234,0.3); }
.reply-card .footer {
  margin-top: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.reply-card .footer .left { color: var(--muted); font-size: 11px; letter-spacing: 0.04em; }

/* Empty state */
.empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px;
  color: var(--muted); text-align: center;
}
.empty .icon { font-family: 'Fraunces', serif; font-style: italic; font-size: 48px; color: var(--bg-4); margin-bottom: 14px; }
.empty h3 { font-family: 'Fraunces', serif; font-size: 20px; color: var(--cream); margin: 0 0 6px; font-weight: 500; }
.empty p { font-size: 13px; margin: 0; max-width: 36ch; line-height: 1.6; }

/* Scroll polish */
.inbox-list::-webkit-scrollbar, .detail-body::-webkit-scrollbar { width: 6px; }
.inbox-list::-webkit-scrollbar-thumb, .detail-body::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 3px; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- ===================== Sidebar ===================== -->
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">N</div>
      <div class="label">
        Concierge CRM
        <small>Walsh Bay</small>
      </div>
    </div>
    <nav class="nav">
      <div class="group"><span class="lbl">Inbox</span></div>
      <button class="item active" data-filter="all">
        <span class="lbl">All inquiries</span>
        <span class="count" id="count-all">0</span>
      </button>
      <button class="item" data-filter="new">
        <span class="lbl">Unread</span>
        <span class="count" id="count-new">0</span>
      </button>
      <button class="item" data-filter="replied">
        <span class="lbl">Replied</span>
        <span class="count" id="count-replied">0</span>
      </button>
      <button class="item" data-filter="archived">
        <span class="lbl">Archived</span>
        <span class="count" id="count-archived">0</span>
      </button>

      <div class="group"><span class="lbl">AI qualification</span></div>
      <button class="item" data-filter="hot">
        <span class="swatch hot"></span>
        <span class="lbl">Hot leads</span>
        <span class="count" id="count-hot">0</span>
      </button>
      <button class="item" data-filter="warm">
        <span class="swatch warm"></span>
        <span class="lbl">Warm</span>
        <span class="count" id="count-warm">0</span>
      </button>
      <button class="item" data-filter="cold">
        <span class="swatch cold"></span>
        <span class="lbl">Cold</span>
        <span class="count" id="count-cold">0</span>
      </button>

      <div class="group"><span class="lbl">By source</span></div>
      <button class="item" data-filter="src:instagram">
        <span class="swatch" style="background:#E0524C"></span>
        <span class="lbl">Instagram</span><span class="count" id="count-src-instagram">0</span>
      </button>
      <button class="item" data-filter="src:google">
        <span class="swatch" style="background:#5DCC83"></span>
        <span class="lbl">Google</span><span class="count" id="count-src-google">0</span>
      </button>

/* ============================================================
   App state + render
   ============================================================ */
const state = { filter: "all", search: "", selectedId: null };
const $ = (s) => document.querySelector(s);
const list = $("#list");
const detail = $("#detail");

function matchesFilter(it) {
  if (state.filter === "all") return true;
  if (state.filter === "new") return it.status === "new";
  if (state.filter === "replied") return it.status === "replied";
  if (state.filter === "archived") return it.status === "archived";
  if (state.filter === "hot")  return it.ai.level === "hot";
  if (state.filter === "warm") return it.ai.level === "warm";
  if (state.filter === "cold") return it.ai.level === "cold";
  if (state.filter.startsWith("car:")) return it.car === state.filter.slice(4);
  if (state.filter.startsWith("src:")) return it.source && it.source.channel === state.filter.slice(4);
  return true;
}
function matchesSearch(it) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return [it.name, it.contact, it.suburb, it.notes, it.car].some(v => (v || "").toLowerCase().includes(q));
}

function renderCounts() {
  $("#count-all").textContent = INQUIRIES.length;
  $("#count-new").textContent = INQUIRIES.filter(i => i.status === "new").length;
  $("#count-replied").textContent = INQUIRIES.filter(i => i.status === "replied").length;
  $("#count-archived").textContent = INQUIRIES.filter(i => i.status === "archived").length;
  $("#count-hot").textContent = INQUIRIES.filter(i => i.ai.level === "hot").length;
  $("#count-warm").textContent = INQUIRIES.filter(i => i.ai.level === "warm").length;
  $("#count-cold").textContent = INQUIRIES.filter(i => i.ai.level === "cold").length;
  ["spectre","db12","750s","purosangue","g63","911"].forEach(c => {
    $("#count-" + c).textContent = INQUIRIES.filter(i => i.car === c).length;
  });
  ["instagram","google","referral","signal","direct","email","pinterest","sms"].forEach(s => {
    const node = $("#count-src-" + s);
    if (node) node.textContent = INQUIRIES.filter(i => i.source && i.source.channel === s).length;
  });

  $("#stat-hot").textContent = INQUIRIES.filter(i => i.ai.level === "hot").length;
  $("#stat-warm").textContent = INQUIRIES.filter(i => i.ai.level === "warm").length;
  const replied = INQUIRIES.filter(i => i.status === "replied").length;
  const total = INQUIRIES.length;
  $("#stat-conv").textContent = total ? Math.round(replied / total * 100) + "%" : "—";
  $("#stat-week").textContent = INQUIRIES.filter(i => i.week).length;
}

function carLabel(slug) {
  return ({ spectre: "Spectre", db12: "DB12", "750s": "750S", purosangue: "Purosangue", g63: "G 63", "911": "911 GT3" })[slug] || slug;
}

// Source channel → tiny inline SVG icon. All 14×14, currentColor strokes.
const SOURCE_ICON = {
  instagram: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.6" fill="currentColor"/></svg>',
  google:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
  referral:  '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 14a4 4 0 0 0-8 0"/><circle cx="12" cy="7" r="3"/><path d="M3 21v-2a4 4 0 0 1 4-4h1M21 21v-2a4 4 0 0 0-4-4h-1"/></svg>',
  signal:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg>',
  direct:    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>',
  email:     '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>',
  pinterest: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M11 7c2.5 0 4 1.5 4 4s-1.5 4-3.5 4c-0.5 0-1-0.2-1.4-0.5M10.5 11l-1.5 6"/></svg>',
  sms:       '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.5 8.5 0 0 1-7.6 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.5 8.5 0 1 1 21 11.5z"/></svg>'
};

function sourcePill(source, big) {
  if (!source) return "";
  const ico = SOURCE_ICON[source.channel] || "";
  return '<span class="source-pill" data-channel="' + source.channel + '">' + ico + (big ? source.label : source.label) + '</span>';
}

function renderList() {
  const items = INQUIRIES.filter(matchesFilter).filter(matchesSearch);
  if (!items.length) {
    list.innerHTML = '<div style="padding:48px 24px;text-align:center;color:var(--muted);font-size:13px;">No inquiries match this filter.</div>';
    return;
  }
  list.innerHTML = items.map(it => `
    <div class="inbox-item ${it.id === state.selectedId ? 'active' : ''}" data-id="${it.id}">
      <div class="row">
        <span class="name ${it.unread ? 'unread' : ''}">${it.name}</span>
        <span class="time">${it.received}</span>
      </div>
      <div class="preview">${escape(it.notes)}</div>
      <div class="meta">
        ${it.isLive ? '<span class="tag ok" style="font-weight:600;">NEW · just submitted</span>' : ""}
        <span class="tag ${it.ai.level}">${it.ai.level} · ${it.ai.score}</span>
        ${sourcePill(it.source)}
        ${it.car !== "—" ? `<span class="tag car">${carLabel(it.car)}</span>` : ""}
        ${it.status === "replied" ? '<span class="tag ok">replied</span>' : ""}
      </div>
    </div>
  `).join("");

  list.querySelectorAll(".inbox-item").forEach(el => {
    el.addEventListener("click", () => {
      state.selectedId = parseInt(el.dataset.id, 10);
      const item = INQUIRIES.find(x => x.id === state.selectedId);
      if (item) item.unread = false;
      renderList();
      renderDetail();
    });
  });
}

function escape(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderDetail() {
  const it = INQUIRIES.find(x => x.id === state.selectedId);
  if (!it) {
    detail.innerHTML = `
      <div class="empty">
        <div class="icon">N</div>
        <h3>Select an inquiry</h3>
        <p>Choose a message from the inbox to see the AI qualification, full details, and a draft reply.</p>
      </div>`;
    return;
  }
  const carName = carLabel(it.car);
  detail.innerHTML = `
    <div class="detail-head">
      <div class="lhs">
        <h2>${it.name}</h2>
        <p class="sub">${escape(it.contact)} · ${it.received}</p>
      </div>
      <div class="actions">
        <button class="btn">Archive</button>
        <button class="btn primary">Mark replied</button>
      </div>
    </div>
    <div class="detail-body">
      <!-- Lead source -->
      ${it.source ? `
      <div class="source-card">
        <div class="ico" style="color:var(--cream)">${SOURCE_ICON[it.source.channel] || ""}</div>
        <div class="info">
          <div class="lbl">Lead source</div>
          <div class="ch">${escape(it.source.label)}</div>
          <div class="det">${escape(it.source.detail)}</div>
        </div>
        ${sourcePill(it.source, true)}
      </div>` : ""}

      <!-- AI qualification -->
      <div class="ai-card">
        <div class="head">
          <div class="who">
            <div class="av">N</div>
            <div>
              <div class="name">Noctis · AI qualifier</div>
              <div class="role">Reviewed at ${it.received.toLowerCase()}</div>
            </div>
          </div>
          <span class="tag ${it.ai.level}">${it.ai.level.toUpperCase()} · score ${it.ai.score}</span>
        </div>
        <div class="verdict">
          <span class="score ${it.ai.level}">${it.ai.score}</span>
          <span class="label">${it.ai.verdict}</span>
        </div>
        <p>${escape(it.ai.reasoning)}</p>
        <div class="signals">
          ${it.ai.signals.map(s => `<span class="tag">${escape(s)}</span>`).join("")}
        </div>
      </div>

      <!-- AI conversation transcript -->
      ${it.conversation && it.conversation.length ? `
      <div class="transcript">
        <div class="head">
          <span class="ttl">AI conversation transcript</span>
          <span class="meta">${it.conversation.length} messages · captured before form submission</span>
        </div>
        <div class="feed">
          ${it.conversation.map(m => `
            <div class="bubble ${m.from === 'bot' ? 'bot' : 'user'}">
              <span class="t">${m.from === 'bot' ? 'Noctis · AI' : escape(it.name.split(' ')[0])} · ${escape(m.time || '')}</span>
              ${escape(m.text)}
            </div>
          `).join("")}
        </div>
        <div class="foot">
          <span>The AI extracted the structured details below from this exchange.</span>
          <span class="extracted">
            ${it.ai.signals.slice(0, 3).map(s => `<span class="tag">${escape(s)}</span>`).join("")}
          </span>
        </div>
      </div>` : ""}

      <!-- Original message -->
      <div class="message">
        <div class="head">
          <div class="from">${it.name}<small>${escape(it.contact)}</small></div>
          <span class="ts">${it.received}</span>
        </div>
        <dl class="grid">
          <dt>Suburb</dt><dd>${escape(it.suburb)}</dd>
          <dt>Dates</dt><dd>${escape(it.dates)}</dd>
          <dt>Car</dt><dd>${carName}</dd>
          <dt>Status</dt><dd>${it.status[0].toUpperCase() + it.status.slice(1)}</dd>
        </dl>
        <div class="body">${escape(it.notes)}</div>
      </div>

      <!-- Suggested reply -->
      <div class="reply-card">
        <div class="head">
          <span class="ttl">Draft reply · AI-generated · in your voice</span>
          <button class="btn">Regenerate</button>
        </div>
        <textarea>${escape(it.ai.suggestedReply)}</textarea>
        <div class="footer">
          <span class="left">Will be sent from concierge@noctis.com.au</span>
          <button class="btn primary">Send reply</button>
        </div>
      </div>
    </div>
  `;
}

// Pull any live inquiries that the public form submitted into localStorage.
// These are prepended (newest first) so they sit at the top of the inbox.
function loadLiveInquiries() {
  try {
    const live = JSON.parse(localStorage.getItem("noctisInquiries") || "[]");
    // Iterate from oldest to newest so unshift produces newest-first ordering.
    for (let i = live.length - 1; i >= 0; i--) {
      const item = live[i];
      if (!item || INQUIRIES.find(x => x.id === item.id)) continue;
      INQUIRIES.unshift(item);
    }
  } catch (e) { console.warn("Could not load live inquiries", e); }
}

function init() {
  loadLiveInquiries();
  renderCounts();
  renderList();

  document.querySelectorAll(".nav .item").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".nav .item").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
      state.filter = el.dataset.filter;
      renderList();
    });
  });

  $("#search").addEventListener("input", e => {
    state.search = e.target.value;
    renderList();
  });

  // Live update — if a new inquiry is submitted in another tab,
  // pick it up and refresh. (Fired by other tabs writing localStorage.)
  window.addEventListener("storage", e => {
    if (e.key === "noctisInquiries") {
      loadLiveInquiries();
      renderCounts();
      renderList();
      // If nothing is selected, surface the newest live one.
      if (!state.selectedId) {
        const newest = INQUIRIES.find(i => i.isLive);
        if (newest) {
          state.selectedId = newest.id;
          renderDetail();
          renderList();
        }
      }
    }
  });

  // Auto-select: prefer the most recent live inquiry (just submitted),
  // otherwise the first hot lead, so the dashboard isn't empty on load.
  const firstLive = INQUIRIES.find(i => i.isLive);
  const firstHot = firstLive || INQUIRIES.find(i => i.ai.level === "hot");
  if (firstHot) {
    state.selectedId = firstHot.id;
    renderList();
    renderDetail();
  }
}

init();
</script>
